name: Frontend CI Pipeline

on:
  push:
    branches: [ "main", "staging", "develop", "feature/**" ]
  pull_request:
    branches: [ "main", "staging", "develop" ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Checkout code của frontend-repo
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Setup Node.js (Version 20 là bản LTS phổ biến hiện nay)
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json' # Cố định đường dẫn cache do source nằm trong thư mục con

    # 3. Cài đặt các thư viện phụ thuộc
    - name: Install Dependencies
      working-directory: ./frontend
      run: npm ci || npm install # Ưu tiên npm ci để cài đúng phiên bản trong package-lock.json

    # 4. Chạy Linter (Kiểm tra lỗi syntax/style của code)
    - name: Run Linter
      working-directory: ./frontend
      run: npm run lint

    # 5. Build dự án (Kiểm tra lỗi TypeScript và tạo bản build Vite)
    - name: Build Project
      working-directory: ./frontend
      run: npm run build
